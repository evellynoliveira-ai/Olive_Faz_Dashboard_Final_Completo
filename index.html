<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>🐞 Olive Faz - Dashboard</title>
  <script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/react.production.min.js"></script>
  <script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/react-dom.production.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', 'Oxygen', 'Ubuntu', 'Cantarell', sans-serif;
      -webkit-font-smoothing: antialiased;
    }
    
    :root {
      --coral: #D85A30;
      --coral-light: #E8714A;
      --coral-dark: #B8461D;
      --text-primary: #1a1a1a;
      --text-secondary: #666;
      --bg-primary: #ffffff;
      --bg-secondary: #f5f3f0;
      --border: #e0d5d0;
      --success: #3B6D11;
      --warning: #BA7517;
      --danger: #A32D2D;
    }
    
    @media (prefers-color-scheme: dark) {
      :root {
        --text-primary: #f5f5f5;
        --text-secondary: #b0b0b0;
        --bg-primary: #1a1a1a;
        --bg-secondary: #2a2a2a;
        --border: #3a3a3a;
      }
    }

    #root {
      min-height: 100vh;
      background-color: var(--bg-secondary);
      color: var(--text-primary);
    }

    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }

    button:hover {
      opacity: 0.9;
    }

    button:active {
      transform: scale(0.98);
    }

    input, textarea, select {
      font-family: inherit;
    }

    /* Scrollbar estilizado */
    ::-webkit-scrollbar {
      width: 8px;
      height: 8px;
    }

    ::-webkit-scrollbar-track {
      background: var(--bg-secondary);
    }

    ::-webkit-scrollbar-thumb {
      background: var(--border);
      border-radius: 4px;
    }

    ::-webkit-scrollbar-thumb:hover {
      background: var(--text-secondary);
    }
  </style>
</head>
<body>
  <div id="root"></div>

  <script>
    const { useState, useEffect, useCallback, useRef, createContext, useContext } = React;
    const { createRoot } = ReactDOM;

    // Firebase Config
    const FIREBASE_CONFIG = {
      apiKey: "AIzaSyDdG0O7FdnOP6h6_kxBkidiJPrdfR68CvM",
      authDomain: "olivefazdashboard.firebaseapp.com",
      databaseURL: "https://olivefazdashboard-default-rtdb.firebaseio.com",
      projectId: "olivefazdashboard",
      storageBucket: "olivefazdashboard.firebasestorage.app",
      messagingSenderId: "1053334296381",
      appId: "1:1053334296381:web:d73296c3f7091fdc1dd754",
      measurementId: "G-8XQVW5EM1Y"
    };

    // ========== MAIN APP ==========
    function OliveFazDashboard() {
      const [currentTab, setCurrentTab] = useState(0);
      const [data, setData] = useState({
        tarefas: [
          { id: 1, nome: 'Modelagem', data: new Date().toISOString().split('T')[0], frequencia: 'Semanal', pecas: [], completa: false, cor: '#7cb342' },
          { id: 2, nome: 'Pintura', data: new Date().toISOString().split('T')[0], frequencia: 'Semanal', pecas: [], completa: false, cor: '#e53935' }
        ],
        pedidos: [
          { id: 1, cliente: 'Ana Silva', dataEnvio: '2026-04-25', valor: 450, frete: 30, pecas: ['Joaninha', 'Espelho'], observacoes: 'Preferência por cores pastéis', imagem: null, atrasado: false, pecasDetalhadas: [{ nome: 'Joaninha', status: 'Pintura' }, { nome: 'Espelho', status: 'Secando' }] }
        ],
        planejamento: [],
        estoque: [
          { id: 1, nome: 'Caixa de Envio', categoria: 'Por Pedido', quantidade: 5, limite: 10 },
          { id: 2, nome: 'Plástico Bolha', categoria: 'Por Peça', quantidade: 8, limite: 15 },
          { id: 3, nome: 'Saquinho de Papel', categoria: 'Por Pedido', quantidade: 3, limite: 10 }
        ],
        concluidos: [
          { id: 1, cliente: 'Laura Costa', dataEnvio: '2026-04-18', valor: 280, frete: 25, pecas: ['Joaninha branca', 'Planta'], imagem: null },
          { id: 2, cliente: 'Sofia Mendes', dataEnvio: '2026-04-15', valor: 450, frete: 30, pecas: ['Espelho 30cm', 'Cogumelo verde'], imagem: null }
        ]
      });
      const [syncStatus, setSyncStatus] = useState('synced');
      const firebaseReady = useRef(false);

      // Load from localStorage
      useEffect(() => {
        const saved = localStorage.getItem('olivefaz-data');
        if (saved) {
          try {
            setData(JSON.parse(saved));
          } catch (e) {
            console.error('Failed to load saved data', e);
          }
        }
      }, []);

      // Save to localStorage
      useEffect(() => {
        localStorage.setItem('olivefaz-data', JSON.stringify(data));
      }, [data]);

      const updateData = useCallback((key, newValue) => {
        setData(prev => ({ ...prev, [key]: newValue }));
      }, []);

      const tabs = [
        { name: 'Tarefas do Dia', icon: '📋' },
        { name: 'Próximos', icon: '🚀' },
        { name: 'Pedidos', icon: '📝' },
        { name: 'Planejamento', icon: '📅' },
        { name: 'Rastreador', icon: '🎨' },
        { name: 'Estoque', icon: '📦' },
        { name: 'Calendário', icon: '📊' },
        { name: 'Concluídos', icon: '✅' },
        { name: 'Relatórios', icon: '📈' }
      ];

      const renderTab = () => {
        switch (currentTab) {
          case 0:
            return React.createElement(TabTarefasDia, { data, updateData });
          case 1:
            return React.createElement(TabProximos, { data, updateData });
          case 2:
            return React.createElement(TabPedidos, { data, updateData });
          case 3:
            return React.createElement(TabPlanejamento, { data, updateData });
          case 4:
            return React.createElement(TabRastreador, { data, updateData });
          case 5:
            return React.createElement(TabEstoque, { data, updateData });
          case 6:
            return React.createElement(TabCalendario, { data, updateData });
          case 7:
            return React.createElement(TabConcluidos, { data, updateData });
          case 8:
            return React.createElement(TabRelatorios, { data, updateData });
          default:
            return null;
        }
      };

      return React.createElement('div', { style: styles.container },
        React.createElement('div', { style: styles.header },
          React.createElement('div', { style: styles.headerContent },
            React.createElement('h1', { style: styles.title }, '🐞 Olive Faz'),
            React.createElement('p', { style: styles.subtitle }, 'Dashboard de Produção')
          ),
          React.createElement('div', { style: styles.syncIndicator },
            syncStatus === 'synced' ? '✓ Sincronizado' :
            syncStatus === 'syncing' ? '⟳ Sincronizando...' : '⚠ Offline'
          )
        ),

        React.createElement('div', { style: styles.tabNav },
          tabs.map((tab, idx) =>
            React.createElement('button', {
              key: idx,
              onClick: () => setCurrentTab(idx),
              style: { ...styles.tabButton, ...(currentTab === idx ? styles.tabButtonActive : {}) }
            },
              React.createElement('span', null, tab.icon),
              React.createElement('span', { style: { fontSize: '11px', marginTop: '4px' } }, tab.name)
            )
          )
        ),

        React.createElement('div', { style: styles.tabContent },
          renderTab()
        )
      );
    }

    // ========== TAB COMPONENTS ==========

    function TabTarefasDia({ data, updateData }) {
      const [showModal, setShowModal] = useState(null);

      return React.createElement('div', { style: styles.tabPanel },
        React.createElement('h2', { style: styles.sectionTitle }, 'Tarefas de Hoje'),
        React.createElement('div', { style: styles.cardGrid },
          data.tarefas.length === 0 ?
            React.createElement('p', { style: styles.emptyState }, 'Nenhuma tarefa para hoje 🎉') :
            data.tarefas.map(tarefa =>
              React.createElement('div', {
                key: tarefa.id,
                style: styles.card,
                onClick: () => setShowModal(tarefa)

                React.createElement('div', { style: styles.taskCardContent },
                  React.createElement('h3', { style: styles.cardTitle }, tarefa.nome),
                  React.createElement('div', { style: styles.taskMeta },

                  )
                ),
                React.createElement('input', {
                  type: 'checkbox',
                  style: styles.taskCheckbox,
                  onChange: () => {},
                  onClick: (e) => e.stopPropagation()
                })
              )
            )
        ),
        showModal && React.createElement(Modal, {
          title: showModal.nome,
          onClose: () => setShowModal(null)
        },
          React.createElement('div', { style: styles.modalContent },
            React.createElement('h3', { style: styles.modalTitle }, 'Peças desta tarefa'),
            React.createElement('p', { style: styles.emptyState }, 'Nenhuma peça nesta tarefa'),
            React.createElement('div', { style: styles.formActions },
              React.createElement('button', { style: styles.btnSecondary, onClick: () => setShowModal(null) }, 'Fechar'),
              React.createElement('button', { style: styles.btnPrimary }, 'Marcar como Completo')
            )
          )
        )
      );
    }

    function TabProximos({ data, updateData }) {
      return React.createElement('div', { style: styles.tabPanel },
        React.createElement('h2', { style: styles.sectionTitle }, 'Próximos Pedidos'),
        React.createElement('div', { style: styles.cardGrid },
          data.pedidos.length === 0 ?
            React.createElement('p', { style: styles.emptyState }, 'Nenhum pedido pendente') :
            data.pedidos.map(pedido => {
              const dataFormatada = new Date(pedido.dataEnvio).toLocaleDateString('pt-BR');
              return React.createElement('div', { key: pedido.id, style: styles.card },
                React.createElement('div', { style: styles.cardHeader },
                  React.createElement('h3', { style: styles.cardTitle }, pedido.cliente),
                  pedido.atrasado && React.createElement('span', { style: styles.badgeAtrasado }, '⚠️ ATRASADO')
                ),
                React.createElement('div', { style: styles.cardMeta },
                  React.createElement('span', null, '📅 ' + dataFormatada),
                  React.createElement('span', null, '💰 R$ ' + (pedido.valor + pedido.frete))
                ),
                React.createElement('p', { style: styles.cardText }, pedido.pecas.join(', ')),
                pedido.observacoes && React.createElement('p', { style: styles.cardSmall }, pedido.observacoes),
                React.createElement('div', { style: styles.cardActions },
                  React.createElement('button', { style: styles.btnSmall }, '✏️ Editar'),
                  React.createElement('button', { style: styles.btnSmall }, '✅ Concluir'),
                  React.createElement('button', { style: styles.btnSmallDanger }, '🗑️ Deletar')
                )
              );
            })
        )
      );
    }

    function TabPedidos({ data, updateData }) {
      const [showModal, setShowModal] = useState(false);
      const [pedidoForm, setPedidoForm] = useState({
        cliente: '',
        dataEnvio: '',
        descricaoPecas: '',
        valorTotal: '',
        frete: '',
        observacoes: '',
        imagem: null
      });

      const handleAddPedido = (e) => {
        e.preventDefault();
        console.log('Novo pedido:', pedidoForm);
        setShowModal(false);
        setPedidoForm({
          cliente: '',
          dataEnvio: '',
          descricaoPecas: '',
          valorTotal: '',
          frete: '',
          observacoes: '',
          imagem: null
        });
      };

      return React.createElement('div', { style: styles.tabPanel },
        React.createElement('div', { style: styles.headerWithButton },
          React.createElement('h2', { style: styles.sectionTitle }, 'Pedidos em Andamento'),
          React.createElement('button', {
            onClick: () => setShowModal(true),
            style: styles.btnPrimary
          }, '+ Novo Pedido')
        ),

        React.createElement('div', { style: styles.pedidosPorMes },
          data.pedidos.length > 0 &&
            React.createElement('div', null,
              React.createElement('h3', { style: styles.monthTitle }, 'Abril 2026'),
              React.createElement('div', { style: styles.cardGrid },
                data.pedidos.map(pedido =>
                  React.createElement('div', { key: pedido.id, style: styles.card },
                    React.createElement('h3', { style: styles.cardTitle }, pedido.cliente),
                    React.createElement('div', { style: styles.pedidoDetails },
                      React.createElement('p', null, React.createElement('strong', null, 'Peças: '), pedido.pecas.join(', ')),
                      React.createElement('p', null, React.createElement('strong', null, 'Valor: '), 'R$ ' + pedido.valor),
                      React.createElement('p', null, React.createElement('strong', null, 'Frete: '), 'R$ ' + pedido.frete),
                      pedido.observacoes && React.createElement('p', null, React.createElement('strong', null, 'Obs: '), pedido.observacoes)
                    ),
                    React.createElement('div', { style: styles.pecasStatus },
                      pedido.pecasDetalhadas.map((peca, idx) =>
                        React.createElement('div', { key: idx, style: styles.pecaStatusItem },
                          React.createElement('span', null, peca.nome),
                          React.createElement('span', { style: styles.statusBadge }, peca.status)
                        )
                      )
                    ),
                    React.createElement('div', { style: styles.cardActions },
                      React.createElement('button', { style: styles.btnSmall }, '✏️ Editar'),
                      React.createElement('button', { style: styles.btnSmall }, '🗑️ Deletar')
                    )
                  )
                )
              )
            ),
          data.pedidos.length === 0 &&
            React.createElement('p', { style: styles.emptyState }, 'Nenhum pedido em andamento')
        ),

        showModal && React.createElement(Modal, {
          title: 'Novo Pedido',
          onClose: () => setShowModal(false)
        },
          React.createElement('form', { onSubmit: handleAddPedido, style: styles.form },
            React.createElement(FormField, {
              label: 'Nome da cliente',
              placeholder: 'Maria ou Ana',
              value: pedidoForm.cliente,
              onChange: (e) => setPedidoForm({ ...pedidoForm, cliente: e.target.value })
            }),
            React.createElement(FormField, {
              label: 'Data de envio',
              type: 'date',
              value: pedidoForm.dataEnvio,
              onChange: (e) => setPedidoForm({ ...pedidoForm, dataEnvio: e.target.value })
            }),
            React.createElement(FormField, {
              label: 'Descrição das peças',
              placeholder: 'Cogumelo; Espelho 20cm; Quadrinho Personalizado',
              value: pedidoForm.descricaoPecas,
              onChange: (e) => setPedidoForm({ ...pedidoForm, descricaoPecas: e.target.value }),
              multiline: true
            }),
            React.createElement('div', { style: styles.formRow },
              React.createElement(FormField, {
                label: 'Valor total',
                type: 'number',
                placeholder: 'R$',
                value: pedidoForm.valorTotal,
                onChange: (e) => setPedidoForm({ ...pedidoForm, valorTotal: e.target.value })
              }),
              React.createElement(FormField, {
                label: 'Frete',
                type: 'number',
                placeholder: 'R$',
                value: pedidoForm.frete,
                onChange: (e) => setPedidoForm({ ...pedidoForm, frete: e.target.value })
              })
            ),
            React.createElement(FormField, {
              label: 'Observações',
              placeholder: 'Comentários gerais',
              value: pedidoForm.observacoes,
              onChange: (e) => setPedidoForm({ ...pedidoForm, observacoes: e.target.value }),
              multiline: true
            }),
            React.createElement('div', { style: styles.formActions },
              React.createElement('button', { type: 'button', onClick: () => setShowModal(false), style: styles.btnSecondary }, 'Cancelar'),
              React.createElement('button', { type: 'submit', style: styles.btnPrimary }, 'Salvar Pedido')
            )
          )
        )
      );
    }

    function TabPlanejamento({ data, updateData }) {
      const [viewMode, setViewMode] = useState('dia');
      const [dataAtual, setDataAtual] = useState(new Date());

      const diasEspeciais = [
        { data: '2026-04-21', tipo: 'feriado', nome: 'Tiradentes' },
        { data: '2026-04-25', tipo: 'crianca', nome: 'Criança sem aula' }
      ];

      const mudaDia = (dias) => {
        const novaData = new Date(dataAtual);
        novaData.setDate(novaData.getDate() + dias);
        setDataAtual(novaData);
      };

      const dataStr = dataAtual.toLocaleDateString('pt-BR');
      const diaSemana = ['Domingo', 'Segunda', 'Terça', 'Quarta', 'Quinta', 'Sexta', 'Sábado'][dataAtual.getDay()];
      const dataAtualStr = `${dataAtual.getFullYear()}-${String(dataAtual.getMonth() + 1).padStart(2, '0')}-${String(dataAtual.getDate()).padStart(2, '0')}`;
      const especial = diasEspeciais.find(d => d.data === dataAtualStr);

      return React.createElement('div', { style: styles.tabPanel },
        React.createElement('div', { style: styles.headerWithButton },
          React.createElement('h2', { style: styles.sectionTitle }, 'Planejamento'),
          React.createElement('div', { style: styles.viewModeButtons },
            ['dia', 'semana', 'mes'].map(mode =>
              React.createElement('button', {
                key: mode,
                onClick: () => setViewMode(mode),
                style: { ...styles.viewModeBtn, ...(viewMode === mode ? styles.viewModeBtnActive : {}) }
              }, mode.charAt(0).toUpperCase() + mode.slice(1))
            )
          )
        ),

        viewMode === 'dia' &&
          React.createElement('div', { style: styles.viewDiaContainer },
            React.createElement('div', { style: styles.diaHeader },
              React.createElement('button', { onClick: () => mudaDia(-1), style: styles.btnSecondary }, '← Anterior'),
              React.createElement('div', null,
                React.createElement('h3', { style: styles.diaTitle }, `${diaSemana} ${dataStr}`),
                especial && React.createElement('p', { style: styles.especialLabel }, `${especial.tipo === 'feriado' ? '🎉' : '👧'} ${especial.nome}`)
              ),
              React.createElement('button', { onClick: () => mudaDia(1), style: styles.btnSecondary }, 'Próximo →')
            ),
            React.createElement('div', { style: styles.diaContent },
              React.createElement('h4', null, 'Tarefas agendadas'),
              React.createElement('p', { style: styles.emptyState }, 'Nenhuma tarefa neste dia')
            )
          ),

        viewMode === 'mes' &&
          React.createElement('p', { style: styles.emptyState }, 'Visualização por mês em desenvolvimento'),

        viewMode === 'semana' &&
          React.createElement('p', { style: styles.emptyState }, 'Visualização por semana em desenvolvimento')
      );
    }

    function TabRastreador({ data, updateData }) {
      const statusList = [
        { status: 'Modelagem', count: 5, pecas: ['Joaninha verde', 'Espelho 20cm'] },
        { status: 'Lixamento', count: 3, pecas: ['Cogumelo', 'Quadro personalizado'] },
        { status: 'Pintura', count: 4, pecas: ['Espelho grande', 'Joaninha'] }
      ];

      return React.createElement('div', { style: styles.tabPanel },
        React.createElement('h2', { style: styles.sectionTitle }, 'Rastreador de Produção'),
        React.createElement('div', { style: styles.rastreadorGrid },
          statusList.map((item, idx) =>
            React.createElement('div', { key: idx, style: styles.statusCard },
              React.createElement('h3', { style: styles.statusTitle }, `${item.status} (${item.count})`),
              React.createElement('div', { style: styles.pecasList },
                item.pecas.map((peca, pidx) =>
                  React.createElement('div', { key: pidx, style: styles.pecaItem }, peca)
                )
              )
            )
          )
        ),
        statusList.length === 0 && React.createElement('p', { style: styles.emptyState }, 'Todas as peças prontas! 🎉')
      );
    }

    function TabEstoque({ data, updateData }) {
      const [showModal, setShowModal] = useState(false);

      return React.createElement('div', { style: styles.tabPanel },
        React.createElement('div', { style: styles.headerWithButton },
          React.createElement('h2', { style: styles.sectionTitle }, 'Estoque'),
          React.createElement('button', {
            onClick: () => setShowModal(true),
            style: styles.btnPrimary
          }, '+ Novo Item')
        ),

        React.createElement('div', { style: styles.estoqueGrid },
          data.estoque.map(item => {
            const alertado = item.quantidade <= item.limite;
            return React.createElement('div', {
              key: item.id,
              style: {
                ...styles.estoqueCard,
                borderLeft: `4px solid ${alertado ? 'var(--warning)' : 'var(--success)'}`
              }
            },
              React.createElement('div', { style: styles.estoqueHeader },
                React.createElement('h3', { style: styles.estoqueName }, item.nome),
                alertado && React.createElement('span', { style: styles.alertBadge }, '⚠️ Baixo')
              ),
              React.createElement('p', { style: styles.estoqueCategory }, item.categoria),
              React.createElement('div', { style: styles.estoqueQuantidade },
                React.createElement('span', { style: styles.quantidadeValue }, item.quantidade),
                React.createElement('span', { style: styles.quantidadeLimite }, `/ ${item.limite}`)
              ),
              React.createElement('input', {
                type: 'number',
                defaultValue: item.quantidade,
                style: styles.quantidadeInput,
                placeholder: 'Quantidade'
              })
            );
          })
        ),

        showModal && React.createElement(Modal, {
          title: 'Novo Item de Estoque',
          onClose: () => setShowModal(false)
        },
          React.createElement('form', {
            style: styles.form,
            onSubmit: (e) => { e.preventDefault(); setShowModal(false); }
          },
            React.createElement(FormField, { label: 'Nome do produto', placeholder: 'Ex: Caixa de Envio' }),
            React.createElement(FormField, {
              label: 'Categoria',
              as: 'select'
            },
              React.createElement('option', null, '📦 Por Pedido'),
              React.createElement('option', null, '📄 Por Peça')
            ),
            React.createElement('div', { style: styles.formRow },
              React.createElement(FormField, { label: 'Quantidade inicial', type: 'number' }),
              React.createElement(FormField, { label: 'Limite de alerta', type: 'number' })
            ),
            React.createElement('div', { style: styles.formActions },
              React.createElement('button', { type: 'button', onClick: () => setShowModal(false), style: styles.btnSecondary }, 'Cancelar'),
              React.createElement('button', { type: 'submit', style: styles.btnPrimary }, 'Salvar Item')
            )
          )
        )
      );
    }

    function TabCalendario({ data, updateData }) {
      const mes = 4; // Abril
      const ano = 2026;

      const tarefasNoMes = [
        { data: '2026-04-15', titulo: 'Modelagem', cor: '#7cb342' },
        { data: '2026-04-16', titulo: 'Pintura', cor: '#d85a30' },
        { data: '2026-04-21', titulo: 'Tiradentes', cor: '#ffb300', categoria: 'feriado' }
      ];

      const diasNoMes = new Date(ano, mes, 0).getDate();
      const primeiroDia = new Date(ano, mes - 1, 1).getDay();

      return React.createElement('div', { style: styles.tabPanel },
        React.createElement('h2', { style: styles.sectionTitle }, 'Calendário - Abril 2026'),
        React.createElement('div', { style: styles.calendarioGrid },
          ['Dom', 'Seg', 'Ter', 'Qua', 'Qui', 'Sex', 'Sab'].map(dia =>
            React.createElement('div', { key: dia, style: styles.diaHeaderCal }, dia)
          ),
          Array.from({ length: primeiroDia }).map((_, i) =>
            React.createElement('div', { key: `empty-${i}`, style: styles.diaCal })
          ),
          Array.from({ length: diasNoMes }).map((_, i) => {

        const todosPedidos = [...data.pedidos, ...data.concluidos];

        const ticketMedio = totalPedidos > 0 ? totalRecebido / totalPedidos : 0;
        const clientesUnicos = new Set(todosPedidos.map(p => p.cliente)).size;
        const pedidosConcluidos = data.concluidos.length;
        const pedidosPendentes = data.pedidos.length;
        
        return { totalPedidos, totalRecebido, ticketMedio, clientesUnicos, pedidosConcluidos, pedidosPendentes };

      // Exportar como JSON

          const status = data.concluidos.includes(p) ? 'Concluído' : 'Pendente';
          const total = (p.valor || 0) + (p.frete || 0);
          const pecas = (p.pecas || []).join(';');
          csv += `"${p.cliente}","${p.dataEnvio}",${p.valor || 0},${p.frete || 0},${total},"${status}","${pecas}"\n`;
        });

        let relatorio = `\n═══════════════════════════════════════════════════\n        🐞 OLIVE FAZ - RELATÓRIO DE GESTÃO\n═══════════════════════════════════════════════════\n\nDATA: ${dataAtual}\n\n━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━\n📊 MÉTRICAS GERAIS\n━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━\n\nTotal de Pedidos: ${metricas.totalPedidos}\n  • Concluídos: ${metricas.pedidosConcluidos}\n  • Pendentes: ${metricas.pedidosPendentes}\n\nClientes Únicos: ${metricas.clientesUnicos}\nFaturamento Total: R$ ${metricas.totalRecebido.toFixed(2)}\nTicket Médio: R$ ${metricas.ticketMedio.toFixed(2)}\n\n━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━\n📈 PEDIDOS CONCLUÍDOS (${metricas.pedidosConcluidos})\n━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━\n`;
        data.concluidos.forEach((p, idx) => {
          const total = (p.valor || 0) + (p.frete || 0);
          relatorio += `\n${idx + 1}. ${p.cliente}\n   Data: ${new Date(p.dataEnvio).toLocaleDateString('pt-BR')}\n   Peças: ${(p.pecas || []).join(', ')}\n   Total: R$ ${total}\n`;
        });
        relatorio += `\n━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━\n⏳ PEDIDOS PENDENTES (${metricas.pedidosPendentes})\n━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━\n`;
        data.pedidos.forEach((p, idx) => {
          const total = (p.valor || 0) + (p.frete || 0);
          const diasRestantes = Math.ceil((new Date(p.dataEnvio) - new Date()) / (1000 * 60 * 60 * 24));
          const status = diasRestantes < 0 ? '⚠️ ATRASADO' : `📅 ${diasRestantes} dias`;
          relatorio += `\n${idx + 1}. ${p.cliente} ${status}\n   Data: ${new Date(p.dataEnvio).toLocaleDateString('pt-BR')}\n   Total: R$ ${total}\n`;
        });
        relatorio += `\n═══════════════════════════════════════════════════\n`;
        const blob = new Blob([relatorio], { type: 'text/plain' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = `olive-faz-relatorio-${new Date().toISOString().split('T')[0]}.txt`;
        a.click();
